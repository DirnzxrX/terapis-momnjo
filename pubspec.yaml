name: therapist_momnjo
description: "Aplikasi Momnjo untuk Terapis"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0  # Tambahkan baris ini

  # UI & Styling
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1 
  
  # State Management & API
  provider: ^6.1.1 
  dio: ^5.4.0 
  shared_preferences: ^2.2.2 

  # Maps & Location (Screen 5 & 7)
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2 
  
  # Kamera & Upload Foto (Screen 7 & 8)
  image_picker: ^1.2.1
  
  # Tanda Tangan Digital (Screen 8)
  signature: ^5.4.0 

  # Format Uang (Rp) & Tanggal (Screen 4, 9)
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  url_launcher: ^6.2.0

flutter:
  uses-material-design: true
  
  # Cukup daftarin foldernya aja, otomatis semua file di dalamnya kebaca
  assets:
    - assets/